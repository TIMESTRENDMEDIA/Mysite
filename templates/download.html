<!DOCTYPE html>
<html>
<head>
    <title>Download Files</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav>
    <a href="/">Home</a>
    <a href="/upload">Upload</a>
    <a href="/download">Download</a>
    <a href="/logout">Logout</a>
</nav>

<div class="container">
    <div class="upload-card">

        <h1>Downloads 📂</h1>

        <!-- SEARCH BAR -->
        <form method="GET" action="/download" style="margin-bottom: 20px;">
            <input type="text" name="search" placeholder="Search files..."
                   value="{{ search if search else '' }}"
                   style="padding:10px; width:70%; border-radius:8px; border:1px solid #ccc;">
            <button type="submit">Search</button>
        </form>

        {% if files %}
            {% for file in files %}

                <div style="
                    background:white;
                    padding:12px;
                    margin:10px 0;
                    border-radius:10px;
                    box-shadow:0 4px 10px rgba(0,0,0,0.1);
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                ">

                    <!-- FILE NAME -->
                    <span>📄 {{ file }}</span>

                    <!-- ACTIONS -->
                    <span>
                        <a href="/download/{{ file }}" style="margin-right:12px; color:#2563eb;">
                            Download
                        </a>

                        <a href="/delete/{{ file }}" style="color:red;">
                            Delete
                        </a>
                    </span>

                </div>

            {% endfor %}
        {% else %}
            <p>No files uploaded yet.</p>
        {% endif %}

        <br>
        <a href="/upload">Upload New File</a>

    </div>
</div>

</body>
</html>
